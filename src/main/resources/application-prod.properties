# Production Profile overrides
# Strictly validate schema without modifying it, disable verbose logging

# DANGER: do not use update/create in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Reduce log noise
logging.level.com.company.I_SPICE=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Optimize frontend
spring.thymeleaf.cache=true

# Prod file upload directory (absolute path in container)
app.upload.dir=/app/uploads/

# Ensure caching is fully enabled if applicable
spring.cache.type=simple

# ============================================
# PRODUCTION SECURITY
# ============================================

# Secure Actuator Endpoints (Only expose health and info metrics publicly)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# OAUTH2 - HARDCODED FOR RAILWAY (https)
# ============================================
# Railway's reverse proxy generates http:// internally, so we override redirect-uri
# explicitly using the APP_BASE_URL env variable set in Railway's environment.
# APP_BASE_URL must be set to: https://i-spice-production-e1f0.up.railway.app
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL}/login/oauth2/code/google
