<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — Admin</title>
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --sidebar-bg: #1a1f2e;
            --sidebar-width: 250px;
            --accent: #D4AF37;
            --accent-green: #2e7d32;
            --danger: #e53935;
            --text-light: #94a3b8;
            --card-bg: #fff;
            --page-bg: #f1f5f9;
            --dark: #1e293b;
            --border: #e2e8f0;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: var(--page-bg);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand .brand-icon {
            width: 42px;
            height: 42px;
            background: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            overflow: hidden;
        }

        .sidebar-brand .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .brand-sub {
            color: var(--text-light);
            font-size: 11px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
        }

        .nav-section-label {
            color: var(--text-light);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 16px 20px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-left-color: var(--accent);
        }

        .nav-item i {
            width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-footer a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-footer a:hover {
            color: #fff;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 20px;
            color: var(--dark);
            font-weight: 700;
        }

        .content {
            padding: 28px;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            padding: 12px 18px;
            background: #f8fafc;
            color: var(--text-light);
            font-weight: 600;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 13px 18px;
            border-top: 1px solid var(--border);
            color: var(--dark);
        }

        tr:hover td {
            background: #f8fafc;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: #b89a2c;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: #c62828;
        }

        .btn-sm {
            padding: 5px 11px;
            font-size: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .btn-outline:hover {
            background: #f8fafc;
        }

        .alert {
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .product-img {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
        }

        .badge-yes {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-no {
            background: #f1f5f9;
            color: var(--text-light);
        }

        .search-bar {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            width: 280px;
            outline: none;
        }
    
        
        /* -- UNIVERSAL MOBILE ADMIN CSS V2 (BEAUTIFUL UX) -- */
        .panel { overflow-x: auto; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: none; margin-bottom: 24px; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        @media (max-width: 900px) {
            .sidebar { width: 80px; }
            .sidebar-brand .brand-name, .sidebar-brand .brand-sub, .nav-item span, .nav-section-label { display: none; }
            .main-content { margin-left: 80px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); padding-bottom: 20px;}
            .topbar { padding: 15px 20px; }
            .content { padding: 15px 20px; }
            .search-bar { width: 200px; }
        }

        @media (max-width: 600px) {
            body { padding-bottom: 90px; background: #f8fafc; }
            .sidebar { 
                width: 100%; height: 75px; min-height: 75px; 
                flex-direction: row; position: fixed;
                top: auto; bottom: 0; left: 0; right: 0;
                background: rgba(26, 31, 46, 0.95);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-top: 1px solid rgba(255,255,255,0.05); 
                padding: 0 10px; z-index: 1000;
                box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
                border-top-left-radius: 24px;
                border-top-right-radius: 24px;
                transition: transform 0.3s ease;
            }
            .sidebar-brand { display: none; }
            .sidebar-nav { display: flex; flex-direction: row; flex: 1; align-items: center; justify-content: space-around; padding: 0; overflow: visible; }
            .nav-item { 
                flex-direction: column; 
                padding: 8px 0; 
                gap: 5px; 
                border: none; 
                flex: 1; 
                justify-content: center; 
                position: relative;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .nav-item i { font-size: 22px; width: auto; margin: 0 auto; text-align: center; color: #94a3b8; transition: all 0.3s; }
            .nav-item span { display: block; font-size: 10px; line-height: 1; text-align: center; margin-top: 2px; font-weight: 600; color: #94a3b8; transition: all 0.3s;}
            .nav-item:hover { background: transparent; }
            
            .nav-item.active { background: transparent; border: none; transform: translateY(-8px); }
            .nav-item.active i { color: var(--accent); font-size: 24px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
            .nav-item.active span { color: var(--accent); }
            
            .nav-item.active::after {
                content: '';
                position: absolute;
                bottom: -8px;
                left: 50%;
                transform: translateX(-50%);
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 10px var(--accent);
            }
            
            .sidebar-footer { display: none; }
            
            .main-content { margin-left: 0; display: flex; flex-direction: column; min-height: calc(100vh - 75px); }
            
            .topbar { 
                padding: 16px 20px; 
                flex-wrap: nowrap; 
                background: rgba(255,255,255,0.9);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-bottom: none;
                box-shadow: 0 4px 20px rgba(0,0,0,0.03);
                position: sticky;
                top: 0;
            }
            .topbar h1 { font-size: 22px; width: auto; font-weight: 800; letter-spacing: -0.5px; }
            .topbar-right { gap: 12px; width: auto; justify-content: flex-end; }
            
            .content { padding: 20px 16px; }
            
            .stats-grid { grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
            .stat-card { 
                padding: 24px; 
                border-radius: 20px; 
                border: none; 
                box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
                background: linear-gradient(145deg, #ffffff, #f8fafc);
                transition: transform 0.2s;
            }
            .stat-card:active { transform: scale(0.98); }
            .stat-icon { width: 60px; height: 60px; border-radius: 16px; font-size: 26px; }
            .stat-number { font-size: 32px; letter-spacing: -1px; }
            
            .panel-header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 20px; background: #fff; border-bottom: 2px solid #f1f5f9; }
            .search-bar { width: 100%; background: #f1f5f9; border: none; padding: 12px 16px; border-radius: 12px; font-size: 15px; }
            .search-bar:focus { box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3); background: #fff; }
            .panel-title { width: 100%; text-align: left; font-size: 18px; font-weight: 800; }
            
            th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 11px; letter-spacing: 1px; padding: 16px; }
            td { padding: 16px; font-size: 14px; }
            
            .form-grid { grid-template-columns: 1fr !important; gap: 20px; padding: 20px !important;}
            .form-group label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
            .form-group input, .form-group select, .form-group textarea { 
                padding: 14px 16px; 
                border-radius: 12px; 
                border: 1px solid #e2e8f0; 
                background: #f8fafc !important;
                font-size: 15px;
                transition: all 0.2s;
            }
            .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                background: #fff !important;
                border-color: var(--accent);
                box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            }
            
            .form-actions { flex-direction: column; gap: 12px; margin-top: 30px; padding: 0 20px 20px !important; }
            .form-actions button, .form-actions a, .btn { 
                width: 100%; 
                justify-content: center; 
                margin: 0 !important; 
                padding: 14px 20px; 
                border-radius: 14px; 
                font-size: 15px; 
                font-weight: 700;
                letter-spacing: 0.5px;
            }
            
            .btn-primary { box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3); }
            
            .image-upload-area { height: 180px !important; border-radius: 16px !important; background: #f8fafc !important; border: 2px dashed #cbd5e1 !important; }
            
            /* Order Timeline specific fixes */
            .status-timeline { flex-direction: column; align-items: flex-start; gap: 24px; margin-top: 30px; padding: 0 20px; }
            .timeline-line { width: 3px; height: calc(100% - 40px); left: 38px; top: 20px; }
            .status-step { flex-direction: row; width: 100%; gap: 20px; align-items: flex-start;}
            .step-icon { width: 40px; height: 40px; font-size: 16px; flex-shrink: 0; z-index: 2; margin-top: 0;}
            .step-text { text-align: left; margin-top: 0; padding-top: 10px;}
            
            /* Hide description column in table on mobile to fit screen better */
            td.hide-mobile, th.hide-mobile { display: none; }
        }
    </style>


</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <img th:src="@{/I-SPICE/logo/logo.png}" alt="Logo">
            </div>
            <div>
                <div class="brand-name">I-SPICE</div>
                <div class="brand-sub">Admin Portal</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Overview</div>
            <a href="/admin" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <div class="nav-section-label">Manage</div>
            <a href="/admin/products" class="nav-item active"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="/admin/users" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="/admin/orders" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Orders</span></a>
            <a href="/admin/support" class="nav-item"><i class="fas fa-headset"></i><span>Support Tickets</span></a>
        </nav>
        <div class="sidebar-footer"><a href="/home"><i class="fas fa-arrow-left"></i> Back to Store</a></div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1><i class="fas fa-box" style="color:var(--accent);margin-right:10px;"></i>Products</h1>
            <a href="/admin/products/new" class="btn btn-primary"><i class="fas fa-plus"></i> Add Product</a>
        </div>
        <div class="content">
            <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span
                    th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-error"><i class="fas fa-times-circle"></i> <span
                    th:text="${error}"></span></div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">All Products (<span th:text="${products.size()}">0</span>)</span>
                    <input type="text" class="search-bar" placeholder="&#xf002; Search products..."
                        oninput="filterTable(this.value)">
                </div>
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Featured</th>
                            <th>Discount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${products}">
                            <td>
                                <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" class="product-img"
                                    alt="Product">
                                <div th:if="${p.imageUrl == null}" class="product-img"
                                    style="background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#94a3b8;">
                                    <i class="fas fa-image"></i>
                                </div>
                            </td>
                            <td>
                                <div style="font-weight:600;" th:text="${p.name}">Product</div>
                                <div style="color:var(--text-light);font-size:12px;"
                                    th:text="${#strings.abbreviate(p.description,50)}">desc</div>
                            </td>
                            <td th:text="${p.category}">Category</td>
                            <td th:text="'₹' + ${p.price}">₹0</td>
                            <td>
                                <span th:text="${p.stock}"
                                    th:style="${p.stock < 10} ? 'color:var(--danger);font-weight:700;' : ''">0</span>
                            </td>
                            <td>
                                <span th:if="${p.featured}" class="badge badge-yes">Yes</span>
                                <span th:if="${!p.featured}" class="badge badge-no">No</span>
                            </td>
                            <td th:text="${p.discount != null ? p.discount + '%' : '0%'}">0%</td>
                            <td style="white-space:nowrap;">
                                <a th:href="@{'/admin/products/' + ${p.id} + '/edit'}" class="btn btn-outline btn-sm"><i
                                        class="fas fa-edit"></i> Edit</a>
                                <form th:action="@{'/admin/products/' + ${p.id} + '/delete'}" method="POST"
                                    style="display:inline;"
                                    onsubmit="return confirm('Delete this product? This cannot be undone.');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i>
                                        Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="8" style="text-align:center;color:var(--text-light);padding:30px;">No products
                                found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function filterTable(q) {
            const rows = document.querySelectorAll('#productsTable tbody tr');
            rows.forEach(r => {
                r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
            });
        }
    </script>
</body>

</html>
