<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User — Admin</title>
    <link rel="icon" type="image/png" th:href="@{/I-SPICE/logo/logo.png}">
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --sidebar-bg: #1a1f2e;
            --sidebar-width: 250px;
            --accent: #D4AF37;
            --text-light: #94a3b8;
            --card-bg: #fff;
            --page-bg: #f1f5f9;
            --dark: #1e293b;
            --border: #e2e8f0;
            --danger: #e53935;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: var(--page-bg);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand .brand-icon {
            width: 42px;
            height: 42px;
            background: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            overflow: hidden;
        }

        .sidebar-brand .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .brand-sub {
            color: var(--text-light);
            font-size: 11px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
        }

        .nav-section-label {
            color: var(--text-light);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 16px 20px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-left-color: var(--accent);
        }

        .nav-item i {
            width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-footer a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 20px;
            color: var(--dark);
            font-weight: 700;
        }

        .content {
            padding: 28px;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 28px;
            max-width: 680px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-group.full-width {
            grid-column: 1/-1;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
        }

        input,
        select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: #b89a2c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .btn-outline:hover {
            background: #f8fafc;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            margin-top: 8px;
        }

        .info-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .info-box strong {
            color: var(--dark);
        }

        /* -- UNIVERSAL MOBILE ADMIN CSS V2 (BEAUTIFUL UX) -- */
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        @media (max-width: 900px) {
            .sidebar { width: 80px; }
            .sidebar-brand .brand-name, .sidebar-brand .brand-sub, .nav-item span, .nav-section-label { display: none; }
            .main-content { margin-left: 80px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); padding-bottom: 20px;}
            .topbar { padding: 15px 20px; }
            .content { padding: 15px 20px; }
            .search-bar { width: 200px; }
        }

        @media (max-width: 600px) {
            body { padding-bottom: 90px; background: #f8fafc; }
            .sidebar { 
                width: 100%; height: 75px; min-height: 75px; 
                flex-direction: row; position: fixed;
                top: auto; bottom: 0; left: 0; right: 0;
                background: rgba(26, 31, 46, 0.95);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border-top: 1px solid rgba(255,255,255,0.05); 
                padding: 0 10px; z-index: 1000;
                box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
                border-top-left-radius: 24px;
                border-top-right-radius: 24px;
                transition: transform 0.3s ease;
            }
            .sidebar-brand { display: none; }
            .sidebar-nav { display: flex; flex-direction: row; flex: 1; align-items: center; justify-content: space-around; padding: 0; overflow: visible; }
            .nav-item { 
                flex-direction: column; 
                padding: 8px 0; 
                gap: 5px; 
                border: none; 
                flex: 1; 
                justify-content: center; 
                position: relative;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .nav-item i { font-size: 22px; width: auto; margin: 0 auto; text-align: center; color: #94a3b8; transition: all 0.3s; }
            .nav-item span { display: block; font-size: 10px; line-height: 1; text-align: center; margin-top: 2px; font-weight: 600; color: #94a3b8; transition: all 0.3s;}
            .nav-item:hover { background: transparent; }
            
            .nav-item.active { background: transparent; border: none; transform: translateY(-8px); }
            .nav-item.active i { color: var(--accent); font-size: 24px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
            .nav-item.active span { color: var(--accent); }
            
            .nav-item.active::after {
                content: '';
                position: absolute;
                bottom: -8px;
                left: 50%;
                transform: translateX(-50%);
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 10px var(--accent);
            }
            
            .sidebar-footer { display: none; }
            
            .main-content { margin-left: 0; display: flex; flex-direction: column; min-height: calc(100vh - 75px); }
            
            .topbar { 
                padding: 16px 20px; 
                flex-wrap: nowrap; 
                background: rgba(255,255,255,0.9);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-bottom: none;
                box-shadow: 0 4px 20px rgba(0,0,0,0.03);
                position: sticky;
                top: 0;
            }
            .topbar h1 { font-size: 22px; width: auto; font-weight: 800; letter-spacing: -0.5px; }
            .topbar-right { gap: 12px; width: auto; justify-content: flex-end; }
            
            .content { padding: 20px 16px; }
            
            .stats-grid { grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
            .stat-card { 
                padding: 24px; 
                border-radius: 20px; 
                border: none; 
                box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
                background: linear-gradient(145deg, #ffffff, #f8fafc);
                transition: transform 0.2s;
            }
            .stat-card:active { transform: scale(0.98); }
            .stat-icon { width: 60px; height: 60px; border-radius: 16px; font-size: 26px; }
            .stat-number { font-size: 32px; letter-spacing: -1px; }
            
            .panel-header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 20px; background: #fff; border-bottom: 2px solid #f1f5f9; }
            .search-bar { width: 100%; background: #f1f5f9; border: none; padding: 12px 16px; border-radius: 12px; font-size: 15px; }
            .search-bar:focus { box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3); background: #fff; }
            .panel-title { width: 100%; text-align: left; font-size: 18px; font-weight: 800; }
            
            th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 11px; letter-spacing: 1px; padding: 16px; }
            td { padding: 16px; font-size: 14px; }
            
            .form-grid { grid-template-columns: 1fr !important; gap: 20px; padding: 20px !important;}
            .form-group label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #475569; }
            .form-group input, .form-group select, .form-group textarea { 
                padding: 14px 16px; 
                border-radius: 12px; 
                border: 1px solid #e2e8f0; 
                background: #f8fafc !important;
                font-size: 15px;
                transition: all 0.2s;
            }
            .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                background: #fff !important;
                border-color: var(--accent);
                box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            }
            
            .form-actions { flex-direction: column; gap: 12px; margin-top: 30px; padding: 0 20px 20px !important; }
            .form-actions button, .form-actions a, .btn { 
                width: 100%; 
                justify-content: center; 
                margin: 0 !important; 
                padding: 14px 20px; 
                border-radius: 14px; 
                font-size: 15px; 
                font-weight: 700;
                letter-spacing: 0.5px;
            }
            
            .btn-primary { box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3); }
            
            .image-upload-area { height: 180px !important; border-radius: 16px !important; background: #f8fafc !important; border: 2px dashed #cbd5e1 !important; }
            
            /* Order Timeline specific fixes */
            .status-timeline { flex-direction: column; align-items: flex-start; gap: 24px; margin-top: 30px; padding: 0 20px; }
            .timeline-line { width: 3px; height: calc(100% - 40px); left: 38px; top: 20px; }
            .status-step { flex-direction: row; width: 100%; gap: 20px; align-items: flex-start;}
            .step-icon { width: 40px; height: 40px; font-size: 16px; flex-shrink: 0; z-index: 2; margin-top: 0;}
            .step-text { text-align: left; margin-top: 0; padding-top: 10px;}

        }
    
        
    
    /* -- FINAL ROBUST MOBILE SCROLLING FIX -- */
    .table-responsive { 
        width: 100% !important; 
        overflow-x: auto !important; 
        -webkit-overflow-scrolling: touch !important; 
        margin-bottom: 24px;
        display: block;
        background: #fff;
    }
    .table-responsive table { 
        min-width: 850px !important; 
        width: 100% !important;
        margin: 0 !important;
    }
    .table-responsive td, .table-responsive th {
        white-space: nowrap !important;
    }

</style>

    <link rel="stylesheet" href="/css/page-transition.css">
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <img th:src="@{/I-SPICE/logo/logo.png}" alt="Logo">
            </div>
            <div>
                <div class="brand-name">I-SPICE</div>
                <div class="brand-sub">Admin Portal</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Overview</div>
            <a href="/admin" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <div class="nav-section-label">Manage</div>
            <a href="/admin/products" class="nav-item"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="/admin/subscriptions" class="nav-item"><i class="fas fa-crown"></i><span>Subscriptions</span></a>
            <a href="/admin/users" class="nav-item active"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="/admin/orders" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Orders</span></a>
            <a href="/admin/support" class="nav-item"><i class="fas fa-headset"></i><span>Support Tickets</span></a>
        </nav>
        <div class="sidebar-footer"><a href="/home"><i class="fas fa-arrow-left"></i> Back to Store</a></div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1>✏️ Edit User</h1>
            <a href="/admin/users" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Users</a>
        </div>
        <div class="content">
            <div class="form-card">
                <div class="info-box">
                    Editing: <strong th:text="${editUser.fullName}">User Name</strong>
                    &nbsp;·&nbsp; Username: <strong th:text="'@' + ${editUser.username}">@user</strong>
                    &nbsp;·&nbsp; Joined: <strong th:text="${#temporals.format(editUser.createdAt, 'MMM dd, yyyy')}">Jan
                        1</strong>
                </div>

                <form th:action="@{'/admin/users/' + ${editUser.id} + '/edit'}" method="POST">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="section-label">Personal Info</div>
                    <div class="form-grid" style="margin-top:12px;">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" name="firstName" required th:value="${editUser.firstName}">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="lastName" th:value="${editUser.lastName}">
                        </div>
                        <div class="form-group full-width">
                            <label>Email *</label>
                            <input type="email" name="email" required th:value="${editUser.email}">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phoneNumber" th:value="${editUser.phoneNumber}"
                                placeholder="+91 XXXXX XXXXX">
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select name="role" required>
                                <option value="USER" th:selected="${editUser.role == 'USER'}">USER — Regular Customer
                                </option>
                                <option value="ADMIN" th:selected="${editUser.role == 'ADMIN'}">ADMIN — Full Access
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="section-label" style="margin-top:20px;">Reset Password <span
                            style="font-weight:400;text-transform:none;letter-spacing:0;">(leave blank to keep
                            current)</span></div>
                    <div class="form-group" style="margin-top:12px;">
                        <label>New Password</label>
                        <input type="password" name="newPassword" placeholder="Minimum 8 characters">
                    </div>

                    <div style="margin-top:24px;display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                        <a href="/admin/users" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="/js/page-transition.js"></script>
</body>

</html>
