<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editing} ? 'Edit Product — Admin' : 'New Product — Admin'">Product Form</title>
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --sidebar-bg: #1a1f2e;
            --sidebar-width: 250px;
            --accent: #D4AF37;
            --accent-green: #2e7d32;
            --danger: #e53935;
            --text-light: #94a3b8;
            --card-bg: #fff;
            --page-bg: #f1f5f9;
            --dark: #1e293b;
            --border: #e2e8f0;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: var(--page-bg);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 16px;
        }

        .brand-name {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .brand-sub {
            color: var(--text-light);
            font-size: 11px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
        }

        .nav-section-label {
            color: var(--text-light);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 16px 20px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-left-color: var(--accent);
        }

        .nav-item i {
            width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-footer a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-footer a:hover {
            color: #fff;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 20px;
            color: var(--dark);
            font-weight: 700;
        }

        .content {
            padding: 28px;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 28px;
            max-width: 820px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-group.full-width {
            grid-column: 1/-1;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
        }

        input,
        select,
        textarea {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            width: 100%;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: #b89a2c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .btn-outline:hover {
            background: #f8fafc;
        }

        .preview-img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 8px;
            object-fit: cover;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            margin-top: 8px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="fas fa-leaf"></i></div>
            <div>
                <div class="brand-name">I-SPICE</div>
                <div class="brand-sub">Admin Portal</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Overview</div>
            <a href="/admin" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <div class="nav-section-label">Manage</div>
            <a href="/admin/products" class="nav-item active"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="/admin/users" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="/admin/orders" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Orders</span></a>
            <a href="/admin/support" class="nav-item"><i class="fas fa-headset"></i><span>Support Tickets</span></a>
        </nav>
        <div class="sidebar-footer"><a href="/home"><i class="fas fa-arrow-left"></i> Back to Store</a></div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1 th:text="${editing} ? '✏️ Edit Product' : '➕ Add New Product'">Product Form</h1>
            <a href="/admin/products" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Products</a>
        </div>
        <div class="content">
            <div class="form-card">
                <form th:action="${editing} ? @{'/admin/products/' + ${product.id} + '/edit'} : @{/admin/products/new}"
                    method="POST">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="section-label">Basic Information</div>
                    <div class="form-grid" style="margin-top:12px;">
                        <div class="form-group full-width">
                            <label>Product Name *</label>
                            <input type="text" name="name" required placeholder="e.g. Organic Turmeric Powder"
                                th:value="${product.name}">
                        </div>
                        <div class="form-group full-width">
                            <label>Description *</label>
                            <textarea name="description" required placeholder="Describe the product..."
                                th:text="${product.description}"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select name="category" required>
                                <option value="">— Select Category —</option>
                                <option value="Spices" th:selected="${product.category == 'Spices'}">Spices</option>
                                <option value="Herbs" th:selected="${product.category == 'Herbs'}">Herbs</option>
                                <option value="Blends" th:selected="${product.category == 'Blends'}">Blends</option>
                                <option value="Seeds" th:selected="${product.category == 'Seeds'}">Seeds</option>
                                <option value="Powders" th:selected="${product.category == 'Powders'}">Powders</option>
                                <option value="Salts" th:selected="${product.category == 'Salts'}">Salts</option>
                                <option value="Gift Sets" th:selected="${product.category == 'Gift Sets'}">Gift Sets
                                </option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Origin</label>
                            <input type="text" name="origin" placeholder="e.g. Kerala, India"
                                th:value="${product.origin}">
                        </div>
                    </div>

                    <div class="section-label" style="margin-top:20px;">Pricing & Stock</div>
                    <div class="form-grid" style="margin-top:12px;">
                        <div class="form-group">
                            <label>Price (₹) *</label>
                            <input type="number" name="price" required step="0.01" min="0" placeholder="0.00"
                                th:value="${product.price}">
                        </div>
                        <div class="form-group">
                            <label>Discount (%)</label>
                            <input type="number" name="discount" min="0" max="100" placeholder="0"
                                th:value="${product.discount}">
                        </div>
                        <div class="form-group">
                            <label>Stock Quantity *</label>
                            <input type="number" name="stock" required min="0" placeholder="100"
                                th:value="${product.stock}">
                        </div>
                        <div class="form-group">
                            <label>Weight (grams)</label>
                            <input type="number" name="weightGrams" min="0" placeholder="100"
                                th:value="${product.weightGrams}">
                        </div>
                    </div>

                    <div class="section-label" style="margin-top:20px;">Product Image</div>
                    <div class="form-group" style="margin-top:12px;">
                        <label>Image URL</label>
                        <input type="url" name="imageUrl" id="imageUrlInput" placeholder="https://example.com/image.jpg"
                            th:value="${product.imageUrl}" oninput="previewImg(this.value)">
                        <img id="previewImg" class="preview-img" th:if="${product.imageUrl != null}"
                            th:src="${product.imageUrl}" alt="Preview">
                        <img id="previewImgEmpty" class="preview-img" th:if="${product.imageUrl == null}"
                            style="display:none;" alt="Preview">
                    </div>

                    <div class="section-label" style="margin-top:20px;">Spice Details</div>
                    <div class="form-grid" style="margin-top:12px;">
                        <div class="form-group">
                            <label>Spicy Level (1–5)</label>
                            <input type="number" name="spicyLevel" min="1" max="5" placeholder="3"
                                th:value="${product.spicyLevel}">
                        </div>
                        <div class="form-group" style="justify-content:flex-end;">
                            <label style="margin-bottom:4px;">Flags</label>
                            <div class="checkbox-row" style="margin-bottom:8px;">
                                <input type="checkbox" name="organic" id="organicToggle"
                                    th:checked="${product.organic}">
                                <label for="organicToggle" style="font-weight:500;cursor:pointer;">🌿 Certified
                                    Organic</label>
                            </div>
                            <div class="checkbox-row">
                                <input type="checkbox" name="featured" id="featuredToggle"
                                    th:checked="${product.featured}">
                                <label for="featuredToggle" style="font-weight:500;cursor:pointer;">⭐ Featured
                                    Product</label>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:28px;display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary">
                            <i th:class="${editing} ? 'fas fa-save' : 'fas fa-plus'"></i>
                            <span th:text="${editing} ? 'Save Changes' : 'Create Product'">Submit</span>
                        </button>
                        <a href="/admin/products" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function previewImg(url) {
            const img = document.getElementById('previewImg') || document.getElementById('previewImgEmpty');
            if (img && url) { img.src = url; img.style.display = 'block'; }
        }
    </script>
</body>

</html>
