<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - I-SPICE</title>
    <link rel="icon" type="image/png" th:href="@{/I-SPICE/logo/logo.png}">
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4b1e 0%, #2e7d32 40%, #b8941f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(46, 125, 50, 0.2) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22), 0 2px 8px rgba(212, 175, 55, 0.12);
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7d32, #D4AF37);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2e7d32;
            letter-spacing: 1px;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 22px;
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #1a5c2a;
            border: 1px solid rgba(40, 167, 69, 0.25);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            color: #7a1a1a;
            border: 1px solid rgba(220, 53, 69, 0.25);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 15px;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 2px solid #e8e3d5;
            border-radius: 10px;
            font-size: 15px;
            background: #f9f7f0;
            color: #333;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: #2e7d32;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        .form-control:focus+i,
        .input-wrap:focus-within i {
            color: #2e7d32;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2e7d32, #D4AF37);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .back-link a {
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/page-transition.css">
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-circle">
                <img src="/I-SPICE/logo/logo.png" alt="I-SPICE"
                    onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fas fa-leaf\' style=\'font-size:32px;color:white;\'></i>'">
            </div>
            <h1>I-SPICE</h1>
            <p>Premium Plant-Based Products</p>
        </div>

        <div class="page-title">Forgot your password?</div>
        <div class="page-subtitle">No worries! Enter your registered email and we'll send you a secure reset link valid
            for 1 hour.</div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-wrap">
                    <input class="form-control" type="email" id="email" name="email" placeholder="your@email.com"
                        required autocomplete="email">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i>&nbsp; Send Reset Link
            </button>
        </form>

        <div class="back-link">
            Remember your password? <a href="/login">Back to Sign In</a>
        </div>
    </div>
    <script src="/js/page-transition.js"></script>
</body>

</html>
