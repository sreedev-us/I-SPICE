<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - I-SPICE</title>
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4b1e 0%, #2e7d32 40%, #b8941f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(46, 125, 50, 0.2) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22), 0 2px 8px rgba(212, 175, 55, 0.12);
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7d32, #D4AF37);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2e7d32;
            letter-spacing: 1px;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 22px;
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #1a5c2a;
            border: 1px solid rgba(40, 167, 69, 0.25);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            color: #7a1a1a;
            border: 1px solid rgba(220, 53, 69, 0.25);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 15px;
            transition: color 0.2s;
        }

        .input-wrap .toggle-pw {
            left: auto;
            right: 14px;
            cursor: pointer;
        }

        .input-wrap:focus-within i {
            color: #2e7d32;
        }

        .form-control {
            width: 100%;
            padding: 13px 42px 13px 42px;
            border: 2px solid #e8e3d5;
            border-radius: 10px;
            font-size: 15px;
            background: #f9f7f0;
            color: #333;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: #2e7d32;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        /* Password strength bar */
        .strength-bar-wrap {
            margin-top: 8px;
            height: 4px;
            background: #e8e3d5;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s;
        }

        .strength-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2e7d32, #D4AF37);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .back-link a {
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Expired/invalid state only shows message + back link */
        .error-only-card .form-group,
        .error-only-card .btn-submit {
            display: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/page-transition.css">
</head>

<body>
    <div class="card" th:classappend="${error != null and token == null} ? 'error-only-card' : ''">
        <div class="logo">
            <div class="logo-circle">
                <img src="/I-SPICE/logo/logo.png" alt="I-SPICE"
                    onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fas fa-leaf\' style=\'font-size:32px;color:white;\'></i>'">
            </div>
            <h1>I-SPICE</h1>
            <p>Premium Plant-Based Products</p>
        </div>

        <div class="page-title">Set New Password</div>
        <div class="page-subtitle">Choose a strong password with at least 8 characters.</div>

        <!-- Flash messages -->
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Only show form if we have a valid token -->
        <form th:if="${token}" th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="token" th:value="${token}" />

            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <div class="input-wrap">
                    <input class="form-control" type="password" id="password" name="password"
                        placeholder="Min. 8 characters" required minlength="8" oninput="checkStrength(this.value)">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-pw" onclick="togglePw('password', this)" title="Show/hide"></i>
                </div>
                <div class="strength-bar-wrap">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <input class="form-control" type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Repeat your password" required minlength="8">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-pw" onclick="togglePw('confirmPassword', this)" title="Show/hide"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" onclick="return validateForm()">
                <i class="fas fa-key"></i>&nbsp; Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="/forgot-password"><i class="fas fa-arrow-left"></i> Request a new link</a>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            <a href="/login">Back to Sign In</a>
        </div>
    </div>

    <script>
        function togglePw(fieldId, icon) {
            const input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkStrength(val) {
            const bar = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            let score = 0;
            if (val.length >= 8) score++;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { w: '20%', c: '#dc3545', t: 'Very weak' },
                { w: '40%', c: '#fd7e14', t: 'Weak' },
                { w: '60%', c: '#ffc107', t: 'Fair' },
                { w: '80%', c: '#20c997', t: 'Good' },
                { w: '100%', c: '#28a745', t: 'Strong ✓' },
            ];
            const lvl = Math.max(0, Math.min(score - 1, 4));
            bar.style.width = levels[lvl].w;
            bar.style.background = levels[lvl].c;
            label.textContent = val.length > 0 ? levels[lvl].t : '';
        }

        function validateForm() {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw !== cpw) {
                alert('Passwords do not match.');
                return false;
            }
            if (pw.length < 8) {
                alert('Password must be at least 8 characters.');
                return false;
            }
            return true;
        }
    </script>
    <script src="/js/page-transition.js"></script>
</body>

</html>
